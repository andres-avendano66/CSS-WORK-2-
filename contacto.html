<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Conecta con Nosotros</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-animado-contacto">

    <a href="#main-content" class="skip-link">Saltar al contenido principal</a>

    <header class="navbar">
        <nav class="nav-container">
            <div class="logo-container">
                <img src="img/logo.png" alt="Logo de Proyecto Web" class="nav-logo-img">
                <div class="logo">PROYECTO<span>WEB</span></div>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="galeria.html">Galería</a></li>
                <li><a href="contacto.html" class="active">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content" class="fade-in">
        <section class="form-section">
            <div class="form-container">
                <div class="form-info">
                    <h2>Hablemos</h2>
                    <p>Utilizamos Flexbox para organizar este formulario accesible y responsive.</p>
                </div>
                <form action="#" class="contact-form">
                    <div class="flex-row">
                        <div class="input-group">
                            <label for="name">Nombre</label>
                            <input type="text" id="name" placeholder="Tu nombre" required>
                        </div>
                        <div class="input-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="correo@ejemplo.com" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="message">Mensaje</label>
                        <textarea id="message" rows="5" placeholder="¿En qué podemos ayudarte?"></textarea>
                    </div>
                    <button type="submit" class="btn-primary">Enviar Mensaje</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Entregable Profesional - Diseño Responsivo y Accesible</p>
    </footer>
</body>
</html>
